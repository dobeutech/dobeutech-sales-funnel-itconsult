name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Calculate short branch name and expiration date
        id: branch_calc
        run: |
          RAW_BRANCH="preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}"
          TRUNC_BRANCH="${RAW_BRANCH:0:63}"
          echo "TRUNCATED_BRANCH=$TRUNC_BRANCH" >> "$GITHUB_ENV"
          echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Clean up old orphaned preview branches to free quota
        run: |
          npm i -g neonctl@v2
          # Delete oldest preview branches, keeping the 5 most recent ones to stay within Neon Free limits
          neonctl branches list --project-id ${{ vars.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }} --output json \
            | jq -c 'map(select(.name | startswith("preview/pr-")))' \
            | jq -c 'sort_by(.created_at) | .[0:-5][]' \
            | jq -r '.id' \
            | xargs -I {} neonctl branches delete {} --project-id ${{ vars.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }} || true

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.TRUNCATED_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}
          database: salesfunnel
          role: salesfunnel_owner
          expires_at: ${{ env.EXPIRES_AT }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Calculate short branch name
        run: |
          RAW_BRANCH="preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}"
          TRUNC_BRANCH="${RAW_BRANCH:0:63}"
          echo "TRUNCATED_BRANCH=$TRUNC_BRANCH" >> "$GITHUB_ENV"

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ env.TRUNCATED_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}
