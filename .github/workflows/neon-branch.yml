name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create safe branch name
        run: |
          RAW_NAME="preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}"
          SAFE_NAME=${RAW_NAME:0:63}
          echo "SAFE_BRANCH_NAME=${SAFE_NAME}" >> "$GITHUB_ENV"

      - name: Install neonctl
        run: npm i -g neonctl@v2

      - name: Cleanup older branches if limit reached
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          # Fetch all branches for the project
          # neonctl list-branches requires --project-id
          BRANCHES=$(neonctl branches list --project-id "$PROJECT_ID" -o json)

          # We only want to delete branches that are for previews and not the current PR
          # We will filter for branches that start with "preview/pr-" and are NOT the current branch
          BRANCH_COUNT=$(echo "$BRANCHES" | jq '. | length')
          echo "Current branch count: $BRANCH_COUNT"

          if [ "$BRANCH_COUNT" -ge 8 ]; then
            echo "Branch limit reached. Cleaning up older preview branches..."

            # Find the oldest preview branch that is NOT the current branch
            # Sort by created_at and get the ID of the first one matching preview/pr-
            OLDEST_BRANCH_ID=$(echo "$BRANCHES" | jq -r '
              map(select(.name | startswith("preview/pr-"))) |
              map(select(.name != env.SAFE_BRANCH_NAME)) |
              sort_by(.created_at) |
              .[0].id // empty
            ')

            if [ -n "$OLDEST_BRANCH_ID" ]; then
               echo "Deleting old branch ID: $OLDEST_BRANCH_ID"
               neonctl branches delete "$OLDEST_BRANCH_ID" --project-id "$PROJECT_ID"
            else
               echo "No eligible old branches to delete. Create might still fail."
            fi
          else
            echo "Branch count within limits."
          fi

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.SAFE_BRANCH_NAME }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}
          database: salesfunnel
          role: salesfunnel_owner

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Create safe branch name
        run: |
          RAW_NAME="preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}"
          SAFE_NAME=${RAW_NAME:0:63}
          echo "SAFE_BRANCH_NAME=${SAFE_NAME}" >> "$GITHUB_ENV"

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ env.SAFE_BRANCH_NAME }}
          api_key: ${{ secrets.NEON_API_KEY }}
